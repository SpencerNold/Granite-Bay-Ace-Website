<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advertisement</title>
    <link rel="stylesheet" href="/advertisement.css"/>

    <!-- Load navbar/footer scripts AFTER DOM is parsed -->
    <script src="/import.js" defer></script>
</head>

<body>
    <div class="advertisement_banner"></div>

    <!--Create a thumbnail for each store as a button-->
    <section class="ad-gallery" aria-label="Ace ad gallery">

        <!-- Left-side gallery viewer -->
        <div class="gallery-layout">
            <div class="viewer" aria-label="Main ad preview">

                <!-- Main image display -->
                <figure class="main-frame" id="mainFrame">
                    <img id="mainAd" src="/images/granite.jpg?v=2" alt="Ace Advertisement Page 01" />
                </figure>

                <!-- Thumbnail rail -->
                <div class="thumbs" aria-label="Ad thumbnails">
                    <div class="thumb-rail" id="thumbRail" role="listbox" aria-label="Choose an ad page">
                        <!-- Each button has data attributes for the main image and store info -->
                        <button class="thumb active" data-src="/images/granite.jpg?v=2"
                            data-alt="Ace Advertisement Page 01" data-store="Granite Bay Ace Hardware"
                            data-addr="8665 Auburn Folsom Rd, Granite Bay, CA 95746"
                            data-hour="Mon-Sat: 8am-7pm <br> Sun: 8am-6pm" data-phone="(916) 797-3993"
                            data-email="granitebayace@yahoo.com" aria-selected="true"> <img
                                src="/images/granite.jpg?v=2" alt="Page 01 thumbnail" />
                            <span>01</span>
                        </button>

                        <button class="thumb" data-src="/images/pine.jpg" data-alt="Ace Advertisement Page 02"
                            data-store="Lake of the Pines Ace Hardware" data-addr="10868 Combie Rd, Auburn, CA 95602"
                            data-hour="Mon-Sat: 8am-7pm <br> Sun: 8am-6pm" data-phone="(530) 268-3484"
                            data-email="granitebayace@yahoo.com" aria-selected="false"> <img src="/images/pine.jpg"
                                alt="Page 02 thumbnail" />
                            <span>02</span>
                        </button>

                        <button class="thumb" data-src="/images/capitol.jpg" data-alt="Ace Advertisement Page 03"
                            data-store="Capitol Ace Hardware" data-addr="1815 I St, Sacramento, CA 95811"
                            data-hour="Mon-Sat: 8am-6pm <br> Sun: 9am-5pm" data-phone="(916) 446-5246"
                            data-email="granitebayace@yahoo.com" aria-selected="false"> <img src="/images/capitol.jpg"
                                alt="Page 03 thumbnail" />
                            <span>03</span>
                        </button>

                        <button class="thumb" data-src="/images/east.jpg" data-alt="Ace Advertisement Page 04"
                            data-store="East Sac Ace Hardware" data-addr="5030 Folsom Blvd, Sacramento, CA 95819"
                            data-hour="Mon-Sat: 8am-7pm <br> Sun: 8am-6pm" data-phone="(916) 518-0606"
                            data-email="granitebayace@yahoo.com" aria-selected="false"> <img src="/images/east.jpg"
                                alt="Page 04 thumbnail" />
                            <span>04</span>
                        </button>

                        <button class="thumb" data-src="/images/comingsoon.jpg" data-alt="Ace Advertisement Page 05"
                            data-store="Blue Oaks Ace Hardware" data-addr="7890 Painted Desert Dr, Roseville, CA 95747"
                            data-hour="TBD" data-phone="TBD"
                            data-email="granitebayace@yahoo.com" aria-selected="false"> <img src="/images/comingsoon.jpg"
                                alt="Page 04 thumbnail" />
                            <span>05</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right-side info box (the white space) -->
            <aside class="store-box" id="storeBox" aria-label="Store information">
                <h2 id="storeName">Granite Bay Ace Hardware</h2>
                <p id="storeAddr">
                    8665 Auburn Folsom Rd, Granite Bay, CA 95746
                </p>
                <p id="storeHour">
                    Mon-Sat: 8am-7pm
                    <br>Sun: 8am-6pm
                </p>
                <p id="storePhone">
                    (916) 797-3993
                </p>
                <p id="storeEmail">
                    granitebayace@yahoo.com
                </p>
            </aside>

            <!-- Right-side action sidebar -->
            <div class="actions-sidebar">

                <div class="map-container">
                    <iframe id="map" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3111.939828184065!2d-121.17109813262103!3d38.74214299703262!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x809ae21e4464d4d5%3A0xcf8985df4a0e7acf!2sGRANITE%20BAY%20ACE%20HARDWARE!5e0!3m2!1sen!2sus!4v1775386269900!5m2!1sen!2sus"
                            width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>

                <a href="/images/advertisements.pdf" class="deals-button" target="_blank" rel="noopener noreferrer">
                    <div class="deals-bg" id="dealsBg"></div>

                    <div class="deals-content">
                        <span>Our <br>Monthly <br>Deals</span>
                        <i class="fa-solid fa-location-arrow"></i>
                    </div>
                </a>

                <div class="QR-container">
                    <div class="QR-content">
                        <span>Ace <br>Rewards</span>
                    </div>
                    <div class="QR-image">
                        <img src="/images/rewardsdownload.png" alt="QR Code"/>
                    </div>
                </div>
            </div>

        </div>
        <script src = "/index.js"></script>
    </section>
</body>
</html>
