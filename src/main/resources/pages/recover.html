<!-- Creates the recover account page with a left section for the page title, instructions, and status messages, and a right section for displaying a list of accounts where an admin can manage password resets, while loading the shared login styling and recovery page functionality -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Recover Account</title>
    <link rel="stylesheet" href="/login.css" />
    <link rel="stylesheet" href="/recover.css" />

</head>
<body>
<script src="/import.js"></script>

<main class="recover-page">
    <section class="recover-layout">

        <aside class="recover-left">
            <div class="login-box recover-left-box">
                <h1 class="login-title">Recover Password</h1>
                <p class="recover-subtitle">
                    Manage and reset passwords for existing accounts.
                </p>

                <p id="recoverMsg" class="recover-msg" aria-live="polite"></p>
            </div>
        </aside>


        <section class="recover-right" aria-label="Accounts list">
            <!-- hidden until admin logs in -->
            <div class="login-box accounts-box" id="accountsBox">
                <div class="accounts-header twocol">
                    <div>Username</div>
                    <div>New Password</div>
                </div>

                <div id="accountsList" class="accounts-body" role="region" aria-live="polite">
                </div>
            </div>
        </section>

    </section>
</main>

<script src="/recover.js"></script>
</body>
</html>
